name: Build dylib

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up
        run: echo "Building libkexploit.dylib"

      - name: Build shared library
        run: |
          gcc -shared -fPIC -o libexploit.dylib kexploit.c
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dylib
          path: libexploit.dylib
